# Globals #
source=./envs.conf
source=./monitors.conf
source=./exec.conf

input {
    kb_layout=us,latam
    kb_variant=ffffff
    kb_model=
    kb_options=grp:alt_shift_toggle
    kb_rules=
    follow_mouse=1
    touchpad {
      natural_scroll=no
    }
} 
 
    
misc {
  enable_swallow=true
  swallow_regex=Alacritty
  swallow_regex=floatcritty
  swallow_regex =^(kitty)$
  layers_hog_keyboard_focus=true
  mouse_move_enables_dpms=false
  key_press_enables_dpms=true
  animate_mouse_windowdragging=false
  animate_manual_resizes=true
  disable_hyprland_logo=true
  vfr=true
  vrr=1
}

xwayland {
    force_zero_scaling = true
    use_nearest_neighbor = true
}

general {
    sensitivity=1 #for mouse cursor
    gaps_in=2
    gaps_out=10
    border_size=0
    col.active_border = rgba(18181822)
    col.inactive_border = rgba(f5BE9888)
    no_border_on_floating=0
    apply_sens_to_raw=0
    resize_on_border=0
    hover_icon_on_border=false
}

decoration {
     rounding=10
     drop_shadow=1
     shadow_ignore_window=true
     shadow_offset=12 10
     shadow_range=15
     shadow_render_power=3
     shadow_scale=0.99
     col.shadow=rgba(000000BB)
     dim_inactive=false
     dim_special=0.75
     dim_strength=0.3
     active_opacity= 1
     blur {
      enabled = true
      size = 5
      passes = 3
      new_optimizations = true
      ignore_opacity = true
      brightness = 0.5
      xray = false 
      contrast = 1.0
      popups = true
    }
}



